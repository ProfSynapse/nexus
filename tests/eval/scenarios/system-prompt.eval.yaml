- name: default-prompt-routes-correctly
  description: Production prompt routes a read request via the two-tool meta architecture
  toolSet: meta
  turns:
    - userMessage: "Read the file notes/meeting.md"
      expectedTools:
        - name: getTools
          params:
            tool: "content"
      mockResponses:
        getTools:
          success: true
          result:
            tools:
              - agent: contentManager
                tool: read
                description: Read content from a file
                command: "content read"
                usage: "content read <path> <startLine>"
                arguments:
                  - name: path
                    flag: --path
                    type: string
                    required: true
                    positional: true
                examples:
                  - 'content read "path-value" 1'

    - expectedTools:
        - name: useTools
          params:
            tool: "content read"
      mockResponses:
        useTools:
          success: true
          result:
            results:
              - tool: contentManager_read
                success: true
                result:
                  content: "# Meeting Notes\n- Reviewed roadmap"
                  path: notes/meeting.md
        contentManager_read:
          success: true
          result:
            content: "# Meeting Notes\n- Reviewed roadmap"
            path: notes/meeting.md

