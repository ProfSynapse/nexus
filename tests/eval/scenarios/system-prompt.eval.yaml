- name: restrictive-prompt-limits-tools
  description: Production prompt routes search request via the two-tool meta architecture
  toolSet: meta
  turns:
    - userMessage: "Search for any notes about the quarterly review"
      expectedTools:
        - name: getTools
          params:
            tool: "search"
      mockResponses:
        getTools:
          success: true
          result:
            tools:
              - agent: searchManager
                tool: content
                description: Search for notes by content keyword
                command: "search content"
                usage: "search content <query>"
                arguments:
                  - name: query
                    flag: --query
                    type: string
                    required: true
                    positional: true
                examples:
                  - 'search content "query-value"'

    - expectedTools:
        - name: useTools
          params:
            tool: "search content"
      mockResponses:
        useTools:
          success: true
          result:
            results:
              - tool: searchManager_content
                success: true
                result:
                  results:
                    - path: notes/q2-review.md
                      score: 0.91
                  totalResults: 1
        searchManager_content:
          success: true
          result:
            results:
              - path: notes/q2-review.md
                score: 0.91
            totalResults: 1
