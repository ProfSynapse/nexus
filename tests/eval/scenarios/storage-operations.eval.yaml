# Storage operations — move, copy, archive, create folder

- name: move-file
  description: User asks to move a file to a different folder
  toolSet: meta
  turns:
    - userMessage: "Move notes/draft.md to the published folder"
      expectedTools:
        - name: getTools
          params:
            request:
              - agent: storageManager
      mockResponses:
        getTools:
          success: true
          result:
            tools:
              - agent: storageManager
                tool: move
                description: Move a file or folder
                inputSchema:
                  type: object
                  properties:
                    path:
                      type: string
                    destination:
                      type: string
                  required:
                    - path
                    - destination

    - expectedTools:
        - name: useTools
      mockResponses:
        useTools:
          success: true
          result:
            results:
              - tool: move
                success: true

