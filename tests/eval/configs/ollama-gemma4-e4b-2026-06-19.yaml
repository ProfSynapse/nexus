mode: mock
testVaultPath: tests/eval/test-vault/

providers:
  ollama:
    apiKeyEnv: OLLAMA_LOCAL
    models:
      - gemma4:e4b
    enabled: true

defaults:
  temperature: 0
  maxRetries: 1
  retryDelayMs: 2000
  timeout: 120000
  systemPrompt: default

capture:
  enabled: true
  dumpOnFailure: true
  artifactsDir: test-artifacts/

scenarios: tests/eval/scenarios/**/*.eval.yaml
